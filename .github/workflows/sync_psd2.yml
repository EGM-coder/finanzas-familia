name: sync_psd2

on:
  schedule:
    # Corre después de update_prices: 22:35 UTC ≈ Kutxabank/Santander mercados cerrados
    - cron: '35 22 * * *'
  workflow_dispatch:  # Manual trigger para testing

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync_psd2
        env:
          ENABLE_BANKING_APPLICATION_ID: ${{ secrets.ENABLE_BANKING_APPLICATION_ID }}
          ENABLE_BANKING_JWT_PRIVATE_KEY: ${{ secrets.ENABLE_BANKING_JWT_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd egmfin-jobs
          python3 sync_psd2.py

      - name: Slack notification (opcional, futuro)
        if: always()
        run: echo "Sync completado"
