name: Update Prices Daily

on:
  schedule:
    - cron: '30 22 * * *'  # 22:30 UTC = 00:30 Madrid (verano) / 23:30 Madrid (invierno)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd egmfin-jobs
          pip install yfinance supabase python-dotenv
      - name: Run update_prices
        working-directory: egmfin-jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python update_prices.py
      - name: Capture patrimonio snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_ROLE_KEY"])
          result = sb.rpc("capture_patrimonio_snapshot").execute()
          print("Snapshot capturado:", result.data)
          EOF
